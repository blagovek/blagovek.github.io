<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Благов Евгений — визитка</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #050505;
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .syncopate { font-family: 'Syncopate', sans-serif; }

    /* Chrome text effect */
    .chrome-text {
      background: linear-gradient(120deg, #e5e7eb, #a1a1aa, #ffffff, #71717a, #e5e7eb);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 4s linear infinite;
      text-shadow: 0 0 18px rgba(59,130,246,0.15);
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* Ambient background */
    .ambient-light {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(800px 500px at 15% 20%, rgba(59,130,246,0.13), transparent 60%),
        radial-gradient(700px 450px at 85% 70%, rgba(59,130,246,0.10), transparent 60%);
      z-index: 0;
    }
  </style>
</head>

<body class="p-4 md:p-8">
  <div class="ambient-light"></div>

  <main class="max-w-md w-full space-y-12 relative z-10">

    <div class="flex justify-between items-center px-2">
      <div class="text-[8px] syncopate tracking-[0.4em] text-zinc-600">
        MODEL: BLAGOV_SYSTEM_v3.0
      </div>
      <div class="text-[8px] syncopate tracking-[0.4em] text-blue-500 animate-pulse">
        • ONLINE
      </div>
    </div>

    <header class="text-left space-y-8 px-2">
      <h1 class="syncopate text-5xl md:text-6xl font-bold leading-none chrome-text tracking-tighter uppercase">
        БЛАГОВ<br>ЕВГЕНИЙ
      </h1>

      <div class="space-y-2 border-l-2 border-white/20 pl-4">
        <a href="tel:+79182730066" class="syncopate text-xl md:text-2xl font-bold hover:text-blue-400 transition-colors duration-300 block">
          8 918 273 00 66
        </a>
        <p class="text-[10px] uppercase tracking-[0.5em] text-zinc-500 font-bold">
          
        </p>
      </div>
    </header>

    <footer class="pt-10 text-center">
      <div class="text-[9px] text-zinc-600 tracking-wide uppercase">
        blagovek.site
      </div>
    </footer>

  </main>
</body>
</html>
